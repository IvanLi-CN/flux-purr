name: Release Firmware

on:
  workflow_run:
    workflows:
      - CI Main
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA on main to release or backfill"
        required: true
        type: string

concurrency:
  group: release-firmware-${{ github.event.workflow_run.head_sha || inputs.commit_sha || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  RELEASE_SNAPSHOT_NOTES_REF: refs/notes/release-snapshots

jobs:
  release-meta:
    name: Release Firmware Meta
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.target.outputs.target_sha }}
      enabled: ${{ steps.snapshot.outputs.release_enabled }}
      level: ${{ steps.snapshot.outputs.release_level }}
      channel: ${{ steps.snapshot.outputs.release_channel }}
      effective_version: ${{ steps.snapshot.outputs.fw_effective_version }}
      tag: ${{ steps.snapshot.outputs.fw_tag }}
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target commit
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target_sha="${{ inputs.commit_sha }}"
          else
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "target_sha=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "${{ github.event.workflow_run.event }}" != "push" ]; then
              echo "target_sha=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            target_sha="${{ github.event.workflow_run.head_sha }}"
          fi
          if [[ ! "${target_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid target SHA: ${target_sha}" >&2
            exit 1
          fi
          git fetch --no-tags origin main
          git cat-file -e "${target_sha}^{commit}"
          if ! git merge-base --is-ancestor "${target_sha}" origin/main; then
            echo "Commit ${target_sha} is not contained in origin/main" >&2
            exit 1
          fi
          echo "target_sha=${target_sha}" >> "$GITHUB_OUTPUT"

      - name: Load release snapshot
        if: steps.target.outputs.target_sha != ''
        id: snapshot
        env:
          TARGET_SHA: ${{ steps.target.outputs.target_sha }}
        run: |
          python3 .github/scripts/release_snapshot.py export \
            --target-sha "${TARGET_SHA}" \
            --notes-ref "${RELEASE_SNAPSHOT_NOTES_REF}" \
            --github-output "$GITHUB_OUTPUT"

  release:
    name: Release Firmware Package
    runs-on: ubuntu-latest
    needs: [release-meta]
    if: needs.release-meta.outputs.enabled == 'true'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout release target
        env:
          TARGET_SHA: ${{ needs.release-meta.outputs.target_sha }}
        run: git checkout --detach "${TARGET_SHA}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Setup Xtensa toolchain
        uses: esp-rs/xtensa-toolchain@v1.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          buildtargets: esp32s3
          default: false

      - name: Build ESP32-S3 firmware
        run: cargo +esp build --manifest-path firmware/Cargo.toml --target xtensa-esp32s3-none-elf --release

      - name: Use snapshot version
        env:
          FW_EFFECTIVE_VERSION: ${{ needs.release-meta.outputs.effective_version }}
          FW_TAG: ${{ needs.release-meta.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${FW_EFFECTIVE_VERSION}" ] || [ -z "${FW_TAG}" ]; then
            echo "Release snapshot did not provide Firmware version outputs" >&2
            exit 1
          fi
          echo "FW_EFFECTIVE_VERSION=${FW_EFFECTIVE_VERSION}" >> "$GITHUB_ENV"
          echo "FW_TAG=${FW_TAG}" >> "$GITHUB_ENV"

      - name: Create and push tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/${FW_TAG}" >/dev/null; then
            echo "Tag ${FW_TAG} already exists; skip"
          else
            git tag -a "${FW_TAG}" -m "${FW_TAG}"
            git push origin "${FW_TAG}"
          fi

      - name: Package firmware artifact
        env:
          FW_RELEASE_DIR: firmware/target/xtensa-esp32s3-none-elf/release
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cp "${FW_RELEASE_DIR}"/*.a artifacts/ 2>/dev/null || true
          tar -czf artifacts/firmware-${FW_EFFECTIVE_VERSION}.tar.gz -C "${FW_RELEASE_DIR}" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FW_TAG }}
          name: ${{ env.FW_TAG }}
          prerelease: ${{ needs.release-meta.outputs.channel == 'rc' }}
          generate_release_notes: true
          files: |
            artifacts/firmware-${{ env.FW_EFFECTIVE_VERSION }}.tar.gz
