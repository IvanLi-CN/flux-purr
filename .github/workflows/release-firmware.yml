name: Release Firmware

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_level:
        description: "major | minor | patch"
        required: true
        default: patch
        type: choice
        options: [major, minor, patch]
      release_channel:
        description: "stable | rc"
        required: true
        default: stable
        type: choice
        options: [stable, rc]

permissions:
  contents: write

jobs:
  release-intent:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.intent.outputs.release_enabled }}
      level: ${{ steps.intent.outputs.release_level }}
      channel: ${{ steps.intent.outputs.release_channel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine release intent
        id: intent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_RELEASE_LEVEL: ${{ inputs.release_level }}
          INPUT_RELEASE_CHANNEL: ${{ inputs.release_channel }}
        run: bash .github/scripts/release-intent.sh

  release:
    runs-on: ubuntu-latest
    needs: [release-intent]
    if: needs.release-intent.outputs.enabled == 'true'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Setup Xtensa toolchain
        uses: esp-rs/xtensa-toolchain@v1.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          buildtargets: esp32s3
          default: false

      - name: Build ESP32-S3 firmware
        run: cargo +esp build --manifest-path firmware/Cargo.toml --target xtensa-esp32s3-none-elf --release

      - name: Compute version
        env:
          RELEASE_LEVEL: ${{ needs.release-intent.outputs.level }}
          RELEASE_CHANNEL: ${{ needs.release-intent.outputs.channel }}
        run: bash .github/scripts/compute-version-fw.sh

      - name: Create and push tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/${FW_TAG}" >/dev/null; then
            echo "Tag ${FW_TAG} already exists; skip"
          else
            git tag -a "${FW_TAG}" -m "${FW_TAG}"
            git push origin "${FW_TAG}"
          fi

      - name: Package firmware artifact
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cp target/xtensa-esp32s3-none-elf/release/*.a artifacts/ 2>/dev/null || true
          tar -czf artifacts/firmware-${FW_EFFECTIVE_VERSION}.tar.gz -C target/xtensa-esp32s3-none-elf/release .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FW_TAG }}
          name: ${{ env.FW_TAG }}
          prerelease: ${{ needs.release-intent.outputs.channel == 'rc' }}
          generate_release_notes: true
          files: |
            artifacts/firmware-${{ env.FW_EFFECTIVE_VERSION }}.tar.gz
