name: CI Main

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-main-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RELEASE_SNAPSHOT_NOTES_REF: refs/notes/release-snapshots

jobs:
  firmware:
    name: Firmware checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: Firmware fmt
        run: bash scripts/check-firmware-fmt.sh

      - name: Firmware clippy
        run: bash scripts/check-firmware-clippy.sh

      - name: Firmware build
        run: bash scripts/check-firmware-build.sh

  web:
    name: Web checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install web dependencies
        run: bun install --cwd web --frozen-lockfile

      - name: Quality gates declaration
        run: python3 .github/scripts/check-quality-gates.py

      - name: Release policy script tests
        run: |
          python3 -m py_compile .github/scripts/release_snapshot.py .github/scripts/check-quality-gates.py
          bash .github/scripts/test-release-labels.sh
          bash .github/scripts/test-version-scripts.sh

      - name: Biome check + typecheck
        run: bash scripts/check-web-check.sh

      - name: Web build
        run: bash scripts/check-web-build.sh

      - name: Storybook build
        run: bash scripts/check-storybook-build.sh

      - name: Install Playwright browsers
        run: cd web && bunx playwright install --with-deps chromium

      - name: Optional E2E
        env:
          SKIP_E2E: "1"
        run: bash scripts/check-web-e2e.sh

  release-snapshot:
    name: Release Snapshot
    runs-on: ubuntu-latest
    needs: [firmware, web]
    if: github.event_name == 'push'
    timeout-minutes: 10
    permissions:
      contents: write
      issues: read
      pull-requests: read
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure immutable release snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/release_snapshot.py ensure \
            --target-sha "${GITHUB_SHA}" \
            --github-repository "${GITHUB_REPOSITORY}" \
            --github-token "${GITHUB_TOKEN}" \
            --notes-ref "${RELEASE_SNAPSHOT_NOTES_REF}" \
            --output "$RUNNER_TEMP/release-snapshot.json"
