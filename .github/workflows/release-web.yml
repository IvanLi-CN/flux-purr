name: Release Web

on:
  workflow_run:
    workflows:
      - CI Main
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA on main to release or backfill"
        required: true
        type: string

concurrency:
  group: release-web-${{ github.event.workflow_run.head_sha || inputs.commit_sha || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  RELEASE_SNAPSHOT_NOTES_REF: refs/notes/release-snapshots

jobs:
  release-meta:
    name: Release Web Meta
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.target.outputs.target_sha }}
      enabled: ${{ steps.snapshot.outputs.release_enabled }}
      level: ${{ steps.snapshot.outputs.release_level }}
      channel: ${{ steps.snapshot.outputs.release_channel }}
      effective_version: ${{ steps.snapshot.outputs.web_effective_version }}
      tag: ${{ steps.snapshot.outputs.web_tag }}
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target commit
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target_sha="${{ inputs.commit_sha }}"
          else
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "target_sha=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "${{ github.event.workflow_run.event }}" != "push" ]; then
              echo "target_sha=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            target_sha="${{ github.event.workflow_run.head_sha }}"
          fi
          if [[ ! "${target_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid target SHA: ${target_sha}" >&2
            exit 1
          fi
          git fetch --no-tags origin main
          git cat-file -e "${target_sha}^{commit}"
          if ! git merge-base --is-ancestor "${target_sha}" origin/main; then
            echo "Commit ${target_sha} is not contained in origin/main" >&2
            exit 1
          fi
          echo "target_sha=${target_sha}" >> "$GITHUB_OUTPUT"

      - name: Load release snapshot
        if: steps.target.outputs.target_sha != ''
        id: snapshot
        env:
          TARGET_SHA: ${{ steps.target.outputs.target_sha }}
        run: |
          python3 .github/scripts/release_snapshot.py export \
            --target-sha "${TARGET_SHA}" \
            --notes-ref "${RELEASE_SNAPSHOT_NOTES_REF}" \
            --github-output "$GITHUB_OUTPUT"

  release:
    name: Release Web Package
    runs-on: ubuntu-latest
    needs: [release-meta]
    if: needs.release-meta.outputs.enabled == 'true'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout release target
        env:
          TARGET_SHA: ${{ needs.release-meta.outputs.target_sha }}
        run: git checkout --detach "${TARGET_SHA}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --cwd web --frozen-lockfile

      - name: Build web
        run: bun run --cwd web build

      - name: Use snapshot version
        env:
          WEB_EFFECTIVE_VERSION: ${{ needs.release-meta.outputs.effective_version }}
          WEB_TAG: ${{ needs.release-meta.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${WEB_EFFECTIVE_VERSION}" ] || [ -z "${WEB_TAG}" ]; then
            echo "Release snapshot did not provide Web version outputs" >&2
            exit 1
          fi
          echo "WEB_EFFECTIVE_VERSION=${WEB_EFFECTIVE_VERSION}" >> "$GITHUB_ENV"
          echo "WEB_TAG=${WEB_TAG}" >> "$GITHUB_ENV"

      - name: Create and push tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/${WEB_TAG}" >/dev/null; then
            echo "Tag ${WEB_TAG} already exists; skip"
          else
            git tag -a "${WEB_TAG}" -m "${WEB_TAG}"
            git push origin "${WEB_TAG}"
          fi

      - name: Package web artifact
        run: |
          set -euo pipefail
          tar -czf web-${WEB_EFFECTIVE_VERSION}.tar.gz -C web/dist .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.WEB_TAG }}
          name: ${{ env.WEB_TAG }}
          prerelease: ${{ needs.release-meta.outputs.channel == 'rc' }}
          generate_release_notes: true
          files: |
            web-${{ env.WEB_EFFECTIVE_VERSION }}.tar.gz
