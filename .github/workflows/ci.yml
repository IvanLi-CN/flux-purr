name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  firmware:
    name: Firmware checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: Firmware fmt
        run: bash scripts/check-firmware-fmt.sh

      - name: Firmware clippy
        run: bash scripts/check-firmware-clippy.sh

      - name: Firmware build
        run: bash scripts/check-firmware-build.sh

  web:
    name: Web checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install web dependencies
        run: bun install --cwd web --frozen-lockfile

      - name: Biome check + typecheck
        run: bash scripts/check-web-check.sh

      - name: Web build
        run: bash scripts/check-web-build.sh

      - name: Storybook build
        run: bash scripts/check-storybook-build.sh

      - name: Install Playwright browsers
        run: cd web && bunx playwright install --with-deps chromium

      - name: Optional E2E
        env:
          SKIP_E2E: "1"
        run: bash scripts/check-web-e2e.sh
